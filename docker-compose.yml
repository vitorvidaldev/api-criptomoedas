services:
  postgres:
    image: postgres:16-alpine
    container_name: crypto-transactions-postgres
    environment:
      POSTGRES_DB: crypto_transactions
      POSTGRES_USER: crypto
      POSTGRES_PASSWORD: crypto
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crypto -d crypto_transactions"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    container_name: crypto-transactions-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/crypto_transactions
      SPRING_DATASOURCE_USERNAME: crypto
      SPRING_DATASOURCE_PASSWORD: crypto
      BINANCE_API_BASE_URL: https://api.binance.com
    ports:
      - "8080:8080"

volumes:
  postgres_data:
